<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Sprawdź komfortowe pokoje i hotele premium dostępne w ofercie Amazing Travel."
    />
    <title>Amazing Travel - podróże bez kompromisów</title>

    <link rel="stylesheet" href="css/index.css" />
    <link rel="stylesheet" href="css/hotels.css" />
  </head>
  <body class="page_light">
    <div id="navbar"></div>
    <main class="hotels">
      <header class="our_rooms">
        <div class="text">
          <h1>Nasze pokoje</h1>
          <p>Wygoda i komfort w każdych warunkach.</p>
        </div>
      </header>
      <section class="rooms">
        <section class="select_room" aria-label="Filtrowanie pokoi">
          <button type="button" class="active">Wszystkie</button>
          <button type="button">Apartamenty</button>
          <button type="button">Z widokiem na morze</button>
          <button type="button">Rodzinne</button>
        </section>

        <div class="all_rooms" aria-label="Lista pokoi"></div>
      </section>
    </main>
    <div id="footer"></div>
    <script src="js/main.js"></script>
    <script src="js/hotels.js"></script>
  </body>
</html>
