<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Odkryj najpiękniejsze kierunki podróży z Amazing Travel — od europejskich miast po egzotyczne miejsca na całym świecie."
    />
    <title>Amazing Travel - podróże bez kompromisów</title>

    <link rel="stylesheet" href="css/index.css" />
    <link rel="stylesheet" href="css/destinations.css" />
  </head>
  <body class="page_light">
    <div id="navbar"></div>
    <main class="destinations">
      <header class="destinations_header">
        <h1 class="">Kierunki podróży</h1>
        <p>Odwiedź niesamowite miejsca na całym świecie.</p>
      </header>

      <section
        class="continents"
        aria-label="Filtrowanie kierunków według kontynentu"
      >
        <button type="button" class="active">Wszystkie</button>
        <button type="button">Azja</button>
        <button type="button">Europa</button>
        <button type="button">Ameryka</button>
        <button type="button">Afryka</button>
      </section>

      <section class="cities" aria-label="Lista kierunków podróży"></section>

      <section class="cant_decide">
        <div class="text">
          <h2>Nie możesz się zdecydować?</h2>
          <p>Pomożemy Ci znaleźć wymarzony kierunek Twojej podróży.</p>
        </div>
        <a href="tel:+48123456789" class="button">Zadzwoń do nas!</a>
      </section>
    </main>

    <div id="footer"></div>
    <script src="js/main.js"></script>
    <script src="js/destinations.js"></script>
  </body>
</html>
