<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Skontaktuj się z Amazing Travel i zaplanuj swoją kolejną podróż z pomocą naszego zespołu."
    />
    <title>Amazing Travel - podróże bez kompromisów</title>

    <link rel="stylesheet" href="css/index.css" />
    <link rel="stylesheet" href="css/contact.css" />
  </head>
  <body class="page_light">
    <div id="navbar"></div>

    <main class="contact">
      <header class="contact_header">
        <h1>Kontakt</h1>
        <p>Skontaktuj się z nami i zaplanuj swoją następną podróż.</p>
      </header>

      <section class="contact_content">
        <div class="contact_info">
          <h2>Dane kontaktowe</h2>

          <div class="info">
            <h3>Email</h3>
            <p>
              <a href="mailto:kontakt@amazingtravel.pl">
                kontakt@amazingtravel.pl
              </a>
            </p>
          </div>

          <div class="info">
            <h3>Telefon</h3>
            <p>
              <a href="tel:+48123456789"> +48 123 456 789 </a>
            </p>
          </div>

          <div class="info">
            <h3>Adres</h3>
            <p>ul. Podróżnicza 12, Warszawa</p>
          </div>

          <div class="info">
            <h3>Godziny pracy</h3>
            <p>Pon - Pt: 9:00 - 18:00</p>
          </div>
        </div>

        <div class="contact_form">
          <h2>Napisz do nas</h2>

          <form>
            <label for="name">Imię i nazwisko</label>
            <input
              id="name"
              name="name"
              type="text"
              placeholder="Imię i nazwisko"
            />

            <label for="email">Adres email</label>
            <input
              id="email"
              name="email"
              type="email"
              placeholder="Adres email"
            />

            <button type="submit">Wyślij wiadomość</button>
          </form>
        </div>
      </section>
    </main>

    <div id="footer"></div>

    <script src="js/main.js"></script>
  </body>
</html>
